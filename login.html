<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Expense Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="theme.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes etFadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .page-wrapper, .main-content, .content-wrapper { animation: etFadeIn 0.22s ease both; }

        :root {
            --primary: #2b6777;
            --primary-light: #52ab98;
            --bg: #f2f5f7;
            --card-bg: #ffffff;
            --text: #2d3742;
            --text-light: #6b7a8d;
            --input-border: #dde3ea;
            --input-bg: #f8fafc;
        }
        [data-theme="dark"] {
            --bg: #0f1923;
            --card-bg: #19263a;
            --text: #dce8f0;
            --text-light: #7a93a8;
            --input-border: #243447;
            --input-bg: #1a2d41;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { height: 100%; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }

        /* ── Split Layout ── */
        .page-wrapper { display: flex; min-height: 100vh; }

        /* ── Brand Panel ── */
        .brand-panel {
            width: 42%;
            background: linear-gradient(160deg, #1b3e48 0%, #2b6777 55%, #3d8f7e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 40px;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        .brand-panel::before {
            content: '';
            position: absolute;
            width: 350px; height: 350px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
            top: -120px; right: -100px;
        }
        .brand-panel::after {
            content: '';
            position: absolute;
            width: 220px; height: 220px;
            border-radius: 50%;
            background: rgba(82,171,152,0.08);
            bottom: 40px; left: -60px;
        }
        .brand-content {
            color: white;
            text-align: center;
            max-width: 320px;
            position: relative;
            z-index: 1;
        }
        .brand-logo {
            width: 90px; height: 90px;
            object-fit: contain;
            margin-bottom: 22px;
            filter: drop-shadow(0 4px 16px rgba(0,0,0,0.3));
        }
        .brand-content h2 { font-size: 1.9rem; font-weight: 700; margin-bottom: 8px; }
        .tagline { font-size: 0.95rem; opacity: 0.78; margin-bottom: 36px; line-height: 1.5; }

        .feature-list { list-style: none; text-align: left; }
        .feature-list li {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            font-size: 0.9rem;
            opacity: 0.88;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .feature-list li:last-child { border-bottom: none; }
        .feature-list li i { color: #52ab98; flex-shrink: 0; }

        /* ── Form Panel ── */
        .form-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 30px;
            background-color: var(--bg);
            transition: background 0.3s;
        }
        .form-container { width: 100%; max-width: 400px; }

        .form-header { text-align: center; margin-bottom: 36px; }
        .form-header h1 { font-size: 1.75rem; font-weight: 700; color: var(--text); }
        .form-header p { font-size: 0.9rem; color: var(--text-light); margin-top: 6px; }

        .form-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 36px;
            box-shadow: 0 8px 32px rgba(43,103,119,0.08);
            transition: background 0.3s;
        }
        [data-theme="dark"] .form-card { box-shadow: 0 8px 32px rgba(0,0,0,0.3); }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 7px;
        }
        .input-group { position: relative; margin-bottom: 22px; }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            pointer-events: none;
            z-index: 2;
        }
        input {
            width: 100%;
            padding: 13px 15px 13px 44px;
            border: 1.5px solid var(--input-border);
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            background-color: var(--input-bg);
            color: var(--text);
            transition: all 0.25s ease;
            box-sizing: border-box;
        }
        input::placeholder { color: var(--text-light); opacity: 0.7; }
        input:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(82,171,152,0.18);
            background-color: var(--card-bg);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2b6777, #3a8a7a);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
            box-shadow: 0 4px 14px rgba(43,103,119,0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(43,103,119,0.4);
        }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .form-footer { text-align: center; margin-top: 24px; font-size: 0.88rem; color: var(--text-light); }
        .form-footer a { color: var(--primary-light); font-weight: 600; text-decoration: none; }
        .form-footer a:hover { text-decoration: underline; }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            .page-wrapper { flex-direction: column; }
            .brand-panel {
                width: 100%;
                padding: 35px 24px 30px;
            }
            .brand-logo { width: 64px; height: 64px; margin-bottom: 14px; }
            .brand-content h2 { font-size: 1.5rem; }
            .tagline { margin-bottom: 0; }
            .feature-list { display: none; }
            .form-panel { padding: 36px 20px; }
            .form-card { padding: 28px 22px; }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">

        <!-- Brand Panel -->
        <div class="brand-panel">
            <div class="brand-content">
                <img src="logo.png" alt="Expense Tracker Logo" class="brand-logo">
                <h2>Expense Tracker</h2>
                <p class="tagline">Smart spending, smarter saving.<br>Take full control of your finances.</p>
                <ul class="feature-list">
                    <li><i data-lucide="check-circle" width="18" height="18"></i> Track daily expenses easily</li>
                    <li><i data-lucide="bar-chart-2" width="18" height="18"></i> Visual analytics & charts</li>
                    <li><i data-lucide="download" width="18" height="18"></i> Export PDF &amp; CSV reports</li>
                    <li><i data-lucide="shield" width="18" height="18"></i> 100% secure &amp; private</li>
                </ul>
            </div>
        </div>

        <!-- Form Panel -->
        <div class="form-panel">
            <div class="form-container">
                <div class="form-header">
                    <h1>Welcome back!</h1>
                    <p>Sign in to your account to continue</p>
                </div>

                <div class="form-card">
                    <form id="loginForm">
                        <label for="login-email">Email Address</label>
                        <div class="input-group">
                            <i data-lucide="mail" width="18" height="18" class="input-icon"></i>
                            <input type="email" id="login-email" name="email" placeholder="you@example.com" required>
                        </div>

                        <label for="login-password">Password</label>
                        <div class="input-group" style="margin-bottom: 6px;">
                            <i data-lucide="lock" width="18" height="18" class="input-icon"></i>
                            <input type="password" id="login-password" name="password" placeholder="Enter your password" required>
                        </div>

                        <button type="submit" class="btn-primary" id="loginBtn">
                            Sign In <i data-lucide="arrow-right" width="18" height="18"></i>
                        </button>
                    </form>
                </div>

                <div class="form-footer">
                    <p>Don't have an account? <a href="registrationform.html">Create one here</a></p>
                </div>
            </div>
        </div>

    </div>

    <script src="toast.js"></script>
    <script>
        lucide.createIcons();

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" width="18" height="18"></i> Authenticating...';
            lucide.createIcons();

            fetch('login.php', { method: 'POST', body: new FormData(this) })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success') {
                        Toast.success('Login successful! Redirecting...');
                        setTimeout(() => { window.location.href = 'dailyexpense.php'; }, 800);
                    } else {
                        Toast.error(data.message || 'Invalid credentials. Please try again.');
                        btn.disabled = false;
                        btn.innerHTML = 'Sign In <i data-lucide="arrow-right" width="18" height="18"></i>';
                        lucide.createIcons();
                    }
                })
                .catch(() => {
                    Toast.error('Network error. Please check your connection.');
                    btn.disabled = false;
                    btn.innerHTML = 'Sign In <i data-lucide="arrow-right" width="18" height="18"></i>';
                    lucide.createIcons();
                });
        });
    </script>
</body>
</html>
