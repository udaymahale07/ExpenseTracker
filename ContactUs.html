<!DOCTYPE html>
  <head>
    <title>Contact Us</title>
    <style>
      body { 
          font-family: 'Segoe UI', sans-serif; 
          background-color: #f2f5f7; 
          padding: 40px; 
          color: #333; 
      }

      h1 { 
          text-align: center; 
          color: #2b6777; 
      }

      form {
        background: #fff;
        padding: 30px;
        border-radius: 10px;
        width: 400px;
        margin: 0 auto;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      }

      label { font-weight: bold; }
      input, textarea {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
      }

      button {
        background-color: #2b6777;
        color: white;
        padding: 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      a {
        display: block;
        text-align: center;
        margin-top: 30px;
        color: #2b6777;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <h1>Contact Us</h1>
    <form>
      <label>Your Name:</label>
      <input type="text" placeholder="John Doe" />

      <label>Email:</label>
      <input type="email" placeholder="john@example.com" />

      <label>Phone :</label>
      <input type="phone number" placeholder="" />

      <label>Message:</label>
      <textarea rows="4" placeholder="Write your message here..."></textarea>

      <button type="submit">Send</button>
    </form>
    <a href="index.php"> Back to Home Page</a>
  </body>
  </html>
