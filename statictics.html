<!DOCTYPE html>
<html>
<head>
  <title>Statistics</title>
  <style>
    body { 
        font-family: 'Segoe UI', sans-serif; 
        background-color: #f2f5f7; 
        padding: 40px; color: #333; 
    }

    h1 { 
        text-align: center; 
        color: #2b6777; 
    }

    .stats-box {
      width: 80%;
      margin: 20px auto;
      padding: 20px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
    }

    .stat-item {
      margin: 10px 0;
      font-weight: bold;
      padding: 8px;
      border-bottom: 1px solid #eee;
    }

    a {
      display: block;
      text-align: center;
      margin-top: 30px;
      color: #2b6777;
      text-decoration: none;
    }

  </style>
</head>
<body>
  <h1>Statistics Summary</h1>
  <div class="stats-box">
    <div class="stat-item">Total Expenses: ₹3500</div>
    <div class="stat-item">Most Spent Category: Food</div>
    <div class="stat-item">Average Daily Spend: ₹250</div>
    <div class="stat-item">Highest Single Expense: ₹1200 (Rent)</div>
    <div class="stat-item">Lowest Expense: ₹40 (Snacks)</div>
  </div>
  <a href="dailyexpense.html">← Back to Home</a>
</body>
</html>
